<div *ngIf="movie">
  <h1>{{ movie.title }}</h1>
  <img [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" alt="{{ movie.title }}" />
  <p>{{ movie.overview }}</p>

  <h3>Cast</h3>
  <ul *ngIf="credits && credits.cast">
    <li *ngFor="let actor of credits.cast.slice(0, 10)">{{ actor.name }} as {{ actor.character }}</li>
  </ul>

  <h3>Translations</h3>
  <ul *ngIf="translations && translations.translations">
    <li *ngFor="let translation of translations.translations">{{ translation.english_name }}</li>
  </ul>
</div>

<div *ngIf="!movie">
  Loading movie details...
</div>
