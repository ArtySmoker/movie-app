<nav>
  <ul class="pagination">
    <li [class.disabled]="currentPage === 1">
      <a (click)="onPageChange(currentPage - 1, $event)">Previous</a>
    </li>
    <li *ngFor="let page of pages" [class.active]="page === currentPage">
      <a (click)="onPageChange(page, $event)">{{ page }}</a>
    </li>
    <li [class.disabled]="currentPage === totalPages">
      <a (click)="onPageChange(currentPage + 1, $event)">Next</a>
    </li>
  </ul>
</nav>
